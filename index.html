<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mwenezi District — WebGIS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="pmtiles.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e1117;--surface:#161b24;--border:#252d3a;--text:#d4cfc7;--muted:#6b7280;--accent:#c8a96e;--accent2:#5b8fa8;--panel-w:290px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}
    #header{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px}
    #header .logo{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--accent)}
    #header .sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    #header .sep{flex:1}
    #header .coord-display{font-size:10px;color:var(--muted)}
    #map{position:fixed;top:52px;left:var(--panel-w);right:0;bottom:0}
    #panel{position:fixed;top:52px;left:0;bottom:0;width:var(--panel-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-section{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
    .section-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .layer-group{margin-bottom:6px}
    .layer-group-label{font-size:9px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;padding-left:2px}
    .layer-item{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;border-radius:4px;transition:opacity .2s}
    .layer-item:hover{opacity:.8}
    .layer-item.off{opacity:.35}
    .layer-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
    .layer-name{font-size:11px;line-height:1.3}
    .opacity-row{display:flex;align-items:center;gap:8px;padding:2px 0 6px 22px}
    .opacity-row input{flex:1;accent-color:var(--accent)}
    .opacity-row span{font-size:9px;color:var(--muted);width:28px;text-align:right}
    #legend-box{padding:14px 16px;overflow-y:auto;flex:1}
    .legend-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .legend-group{margin-bottom:12px}
    .legend-group-name{font-size:10px;color:var(--accent);margin-bottom:6px}
    .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
    .legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
    .legend-row span{font-size:10px;color:var(--text)}
    .maplibregl-popup-content{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:6px!important;padding:12px 14px!important;font-family:'DM Mono',monospace!important;font-size:11px!important;max-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.5)!important}
    .popup-title{font-size:12px;color:var(--accent);margin-bottom:8px;font-family:'Fraunces',serif}
    .popup-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px}
    .popup-key{color:var(--muted)}
    .popup-val{color:var(--text);text-align:right}
    .maplibregl-ctrl-group{background:var(--surface)!important;border:1px solid var(--border)!important}
    .maplibregl-ctrl-group button{background:transparent!important;color:var(--text)!important}
    .maplibregl-ctrl-attrib{display:none!important}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
<div id="header">
  <div class="logo">Mwenezi</div>
  <div class="sub">District · Zimbabwe</div>
  <div class="sep"></div>
  <div class="coord-display" id="coords">— , —</div>
</div>
<div id="panel">
  <div class="panel-section">
    <div class="section-label">Layers</div>
    <div id="layer-list"></div>
  </div>
  <div id="legend-box">
    <div class="legend-title">Legend</div>
    <div id="legend-content"></div>
  </div>
</div>
<div id="map"></div>
<script>
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile.bind(protocol));

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
      mwenezi: { type: 'vector', url: 'pmtiles://mwenezi.pmtiles' }
    },
    layers: [{ id: 'osm-base', type: 'raster', source: 'osm', paint: { 'raster-opacity': 0.25, 'raster-saturation': -0.8 } }]
  },
  center: [30.65, -21.4],
  zoom: 9,
  maxZoom: 14
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');
map.on('mousemove', e => {
  document.getElementById('coords').textContent = e.lngLat.lat.toFixed(4) + '°  ' + e.lngLat.lng.toFixed(4) + '°';
});

const LULC_COLORS = {
  'Trees':                      '#2d6a2d',
  'Crops':                      '#c8a96e',
  'Built Area':                 '#c0392b',
  'Bare Ground':                '#b5985a',
  'Rangeland':                  '#7ab648',
  'Other (Flooded Vegetation)': '#5b8fa8',
  'Other (Water)':              '#3d7ab5',
};


const SLOPE_COLORS = {
  'Flat and Sloping':  '#f5f0e8',
  'Strongly sloping':  '#d4c4a0',
  'Moderately steep':  '#a08060',
  'Steep':             '#705040',
  'Very steep':        '#3a2010',
};

// Layer definitions: raster first (bottom), then vector on top
const layerDefs = [
  {
    id: 'slope-fill',
    label: 'Slope',
    group: 'Vector',
    sourceId: 'mwenezi',
    sourceLayer: 'slope',
    type: 'fill',
    paint: {
      'fill-color': ['match', ['get', 'class description'],
        'Flat and Sloping',  '#f5f0e8',
        'Strongly sloping',  '#d4c4a0',
        'Moderately steep',  '#a08060',
        'Steep',             '#705040',
        'Very steep',        '#3a2010',
        '#888888'
      ],
      'fill-opacity': 0.7
    },
    legend: { title: 'Slope', colors: SLOPE_COLORS },
    swatch: '#a08060',
    hasOpacity: false
  },
  {
    id: 'lulc-fill',
    label: 'Land Use / Land Cover 2024',
    group: 'Vector',
    sourceId: 'mwenezi',
    sourceLayer: 'lulc_2024',
    type: 'fill',
    paint: {
      'fill-color': ['match', ['get', 'class'],
        'Trees',                      '#2d6a2d',
        'Crops',                      '#c8a96e',
        'Built Area',                 '#c0392b',
        'Bare Ground',                '#b5985a',
        'Rangeland',                  '#7ab648',
        'Other (Flooded Vegetation)', '#5b8fa8',
        'Other (Water)',              '#3d7ab5',
        '#888888'
      ],
      'fill-opacity': 0.7
    },
    legend: { title: 'Land Use / Land Cover', colors: LULC_COLORS },
    swatch: '#2d6a2d',
    hasOpacity: false
  },
  {
    id: 'protected-fill',
    label: 'Protected Areas',
    group: 'Vector',
    sourceId: 'mwenezi',
    sourceLayer: 'protected_areas',
    type: 'fill',
    paint: { 'fill-color': 'rgba(80,160,80,0.15)', 'fill-outline-color': '#50a050' },
    legend: null,
    swatch: 'transparent',
    swatchBorder: '#50a050',
    hasOpacity: false
  },
  {
    id: 'wards-fill',
    label: 'Ward Boundaries',
    group: 'Vector',
    sourceId: 'mwenezi',
    sourceLayer: 'ward_boundaries',
    type: 'fill',
    paint: { 'fill-color': 'rgba(91,143,168,0.06)', 'fill-outline-color': '#5b8fa8' },
    legend: null,
    swatch: 'transparent',
    swatchBorder: '#5b8fa8',
    hasOpacity: false
  },
  {
    id: 'channels-line',
    label: 'Drainage Network',
    group: 'Vector',
    sourceId: 'mwenezi',
    sourceLayer: 'channels',
    type: 'line',
    paint: { 'line-color': '#5b8fa8', 'line-width': 1.2, 'line-opacity': 0.9 },
    legend: null,
    swatch: '#5b8fa8',
    hasOpacity: false
  },
];

const visibility = {};
const opacities = {};

map.on('load', () => {
  layerDefs.forEach(def => {
    visibility[def.id] = true;
    opacities[def.id] = def.type === 'raster' ? 0.7 : 1.0;

    if (def.type === 'raster') {
      map.addLayer({ id: def.id, type: 'raster', source: def.sourceId, paint: def.paint, layout: { visibility: 'visible' } });
    } else {
      map.addLayer({ id: def.id, type: def.type, source: def.sourceId, 'source-layer': def.sourceLayer, paint: def.paint, layout: { visibility: 'visible' } });
    }
  });

  // Ward labels
  map.addLayer({
    id: 'ward-labels',
    type: 'symbol',
    source: 'mwenezi',
    'source-layer': 'ward_boundaries',
    layout: { 'text-field': ['coalesce', ['get', 'WARD_NAME'], ['get', 'name'], ['get', 'NAME']], 'text-font': ['Noto Sans Regular'], 'text-size': 10, visibility: 'visible' },
    paint: { 'text-color': '#d4cfc7', 'text-halo-color': '#0e1117', 'text-halo-width': 1.5 }
  });

  buildPanel();
  buildLegend();
  setupPopups();
});

function buildPanel() {
  const list = document.getElementById('layer-list');
  const groups = {};
  layerDefs.slice().reverse().forEach(def => {
    if (!groups[def.group]) {
      const g = document.createElement('div');
      g.className = 'layer-group';
      g.innerHTML = '<div class="layer-group-label">' + def.group + '</div>';
      groups[def.group] = g;
      list.appendChild(g);
    }
    const item = document.createElement('div');
    item.className = 'layer-item';
    item.innerHTML = '<div class="layer-swatch" style="background:' + def.swatch + ';' + (def.swatchBorder ? 'border:1.5px solid ' + def.swatchBorder + ';' : '') + '"></div><div class="layer-name">' + def.label + '</div>';
    item.addEventListener('click', () => {
      visibility[def.id] = !visibility[def.id];
      map.setLayoutProperty(def.id, 'visibility', visibility[def.id] ? 'visible' : 'none');
      item.classList.toggle('off', !visibility[def.id]);
    });
    groups[def.group].appendChild(item);

    if (def.hasOpacity) {
      const row = document.createElement('div');
      row.className = 'opacity-row';
      const slider = document.createElement('input');
      slider.type = 'range'; slider.min = 0; slider.max = 1; slider.step = 0.05; slider.value = 0.7;
      const label = document.createElement('span');
      label.textContent = '70%';
      slider.addEventListener('input', () => {
        const val = parseFloat(slider.value);
        label.textContent = Math.round(val * 100) + '%';
        map.setPaintProperty(def.id, 'raster-opacity', val);
      });
      row.appendChild(slider);
      row.appendChild(label);
      groups[def.group].appendChild(row);
    }
  });
}

function buildLegend() {
  const box = document.getElementById('legend-content');
  layerDefs.forEach(def => {
    if (!def.legend) return;
    const group = document.createElement('div');
    group.className = 'legend-group';
    group.innerHTML = '<div class="legend-group-name">' + def.legend.title + '</div>';
    Object.entries(def.legend.colors).forEach(([label, color]) => {
      group.innerHTML += '<div class="legend-row"><div class="legend-swatch" style="background:' + color + '"></div><span>' + label + '</span></div>';
    });
    box.appendChild(group);
  });
}

function setupPopups() {
  const popup = new maplibregl.Popup({ closeButton: false, maxWidth: '260px' });
  const clickable = ['lulc-fill', 'wards-fill', 'protected-fill'];
  const titles = { 'lulc-fill': 'Land Use / Land Cover', 'wards-fill': 'Ward', 'protected-fill': 'Protected Area' };
  clickable.forEach(layerId => {
    map.on('click', layerId, e => {
      if (!visibility[layerId]) return;
      const props = e.features[0].properties;
      let rows = '';
      Object.entries(props).forEach(([k, v]) => { if (!['fid','id','FID'].includes(k)) rows += '<div class="popup-row"><span class="popup-key">' + k + '</span><span class="popup-val">' + v + '</span></div>'; });
      popup.setLngLat(e.lngLat).setHTML('<div class="popup-title">' + titles[layerId] + '</div>' + rows).addTo(map);
    });
    map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; });
  });
  map.on('click', e => { if (!map.queryRenderedFeatures(e.point, { layers: clickable }).length) popup.remove(); });
}
</script>
</body>
</html>
